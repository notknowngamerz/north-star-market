<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Northstar Market — Requests Admin</title>
  <style>
    :root{--bg:#07111f;--panel:#0c192c;--ink:#eaf2ff;--muted:#9eacc3;--lime:#bbff5c;--line:rgba(179,207,255,.14)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 Inter,ui-sans-serif,system-ui,sans-serif;padding:40px 20px}
    .wrap{width:min(820px,100%);margin:auto}.card{border:1px solid var(--line);border-radius:16px;background:var(--panel);padding:24px}
    h1{font-size:24px;letter-spacing:-.04em;margin:0 0 4px}.sub{color:var(--muted);font-size:13px;margin:0 0 18px}
    input{width:100%;height:42px;border:1px solid var(--line);border-radius:10px;background:rgba(0,0,0,.2);color:var(--ink);padding:0 12px;font:inherit;outline:none;margin-bottom:10px}
    button{cursor:pointer;border:1px solid transparent;border-radius:10px;min-height:42px;padding:0 16px;font-weight:800;background:var(--lime);color:#07111f}
    button.ghost{background:transparent;border-color:var(--line);color:var(--muted)}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .status{margin-top:12px;font-size:13px;color:var(--muted)}.req{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:12px;background:rgba(255,255,255,.03)}
    .req b{color:var(--lime)}.req .meta{color:var(--muted);font-size:11px;margin-top:6px}.req .site{margin-top:8px;white-space:pre-wrap}
    .empty{color:var(--muted);font-size:13px;margin-top:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Website Requests</h1>
      <p class="sub">Enter the admin password to view submissions stored in KV.</p>
      <input id="secret" type="password" placeholder="Admin password" autocomplete="off" />
      <div class="actions">
        <button id="load">View requests</button>
        <button id="clear" class="ghost">Clear all</button>
      </div>
      <div class="status" id="status">No data loaded yet.</div>
      <div id="list"></div>
    </div>
  </div>
  <script>
    const API = 'https://northstar-requests.hs9961984.workers.dev';
    const $ = s => document.querySelector(s);
    $('#load').addEventListener('click', async () => {
      const secret = $('#secret').value.trim();
      if (!secret) { $('#status').textContent = 'Enter the admin password.'; return; }
      $('#status').textContent = 'Loading…';
      try {
        const res = await fetch(`${API}?secret=${encodeURIComponent(secret)}`);
        const data = await res.json();
        if (!res.ok || !data.ok) { $('#status').textContent = 'Unauthorized or error: ' + (data.error || res.status); $('#list').innerHTML = ''; return; }
        $('#status').textContent = `Loaded ${data.count} request(s).`;
        if (!data.items.length) { $('#list').innerHTML = '<div class="empty">No requests yet.</div>'; return; }
        $('#list').innerHTML = data.items.map(it => `<div class="req"><b>${escapeHtml(it.name)}</b> · ${escapeHtml(it.email)}<div class="site">${escapeHtml(it.site)}</div><div class="meta">Received: ${new Date(it.receivedAt).toLocaleString()}</div></div>`).join('');
      } catch (e) { $('#status').textContent = 'Failed: ' + e.message; }
    });
    function escapeHtml(v){return String(v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

    $('#clear').addEventListener('click', async () => {
      const secret = $('#secret').value.trim();
      if (!secret) { $('#status').textContent = 'Enter the admin password first.'; return; }
      if (!confirm('Delete ALL stored requests? This cannot be undone.')) return;
      $('#status').textContent = 'Clearing…';
      try {
        const res = await fetch(`${API}?secret=${encodeURIComponent(secret)}`, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok || !data.ok) { $('#status').textContent = 'Unauthorized or error: ' + (data.error || res.status); return; }
        $('#status').textContent = `Cleared ${data.cleared} request(s).`;
        $('#list').innerHTML = '';
      } catch (e) { $('#status').textContent = 'Failed: ' + e.message; }
    });
  </script>
</body>
</html>
