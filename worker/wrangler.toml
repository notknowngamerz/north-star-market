name = "northstar-requests"
main = "requests.js"
compatibility_date = "2024-09-23"

# KV namespace for storing submissions.
[[kv_namespaces]]
binding = "REQUESTS"
id = "3f73350e898d43688b1e794f3de6836d"

# Optional email forwarding (Cloudflare Email Routing).
# To enable, add an email binding in the Cloudflare dashboard:
#   Workers -> your worker -> Settings -> Bindings -> Add -> Send email
# and name it SEND_EMAIL. Until then, submissions are still stored in KV.
